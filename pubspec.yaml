name: flyyoung_app
description: 小市集營會 攤主端 — NTAG 掃卡 → backend（Android / iOS）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  nfc_manager: ^3.5.0      # NTAG UID 讀取（雙平台）
  http: ^1.2.1             # backend HTTP
  shared_preferences: ^2.2.2  # 非敏感設定持久化
  flutter_secure_storage: ^9.2.2  # API token 存 Keychain/Keystore

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
