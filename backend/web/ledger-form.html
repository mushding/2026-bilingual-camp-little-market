<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>理財島之好管家 · 我的小帳本</title>
<style>
  :root {
    --ink:#3a3326; --muted:#9a8f76; --paper:#f7f0d8; --panel:#fffdf5;
    --teal:#2f8a80; --teal-d:#247169; --sand:#cf9a2f; --sand-soft:#f7ecc8;
    --coral:#e07b3f; --line:#d9cfb4;
  }
  * { box-sizing:border-box; }
  @page { size:A4; margin:10mm; }
  html,body { margin:0; }
  body { font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
         color:var(--ink); background:var(--paper);
         -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .sheet { position:relative; padding:4mm 3mm 24mm; min-height:277mm; }

  .hd { display:flex; justify-content:space-between; align-items:flex-end;
        border-bottom:2.5px solid var(--teal); padding-bottom:8px; }
  .hd .camp { font-size:12px; letter-spacing:3px; color:var(--teal); font-weight:700; }
  .hd .title { font-size:27px; font-weight:800; margin:2px 0 0; }
  .hd .title small { font-size:14px; font-weight:600; color:var(--coral); }
  .hd .verse { text-align:right; font-size:11px; color:var(--muted); line-height:1.6; max-width:230px; }

  .who { display:flex; gap:18px; flex-wrap:wrap; margin:14px 0 10px; font-size:14px; align-items:center; }
  .who .f { display:flex; align-items:flex-end; gap:6px; }
  .who .lbl { color:var(--teal-d); font-weight:700; }
  .who .blank { display:inline-block; border-bottom:1.6px solid var(--ink); min-width:70px; height:20px; }
  .who .seed { display:inline-block; border-bottom:1.6px solid var(--ink); min-width:90px; height:20px; }
  .who .seed-box { background:var(--sand-soft); border:1.5px solid var(--sand); border-radius:8px;
                   padding:4px 12px; font-weight:700; color:var(--ink); }

  table { border-collapse:collapse; width:100%; }
  th,td { border:1px solid var(--line); }
  thead th { background:var(--teal); color:#fff; font-size:12px; font-weight:700; padding:5px 6px; }
  tbody td { height:6.2mm; padding:0 8px; font-size:12px; }
  .c-no { width:26px; text-align:center; color:var(--muted); background:#fbf6e8; }
  .c-in,.c-out,.c-bal { width:82px; }
  thead .c-in { background:var(--teal); }
  tbody tr:nth-child(even) td { background:#fdfaf2; }
  td.r { text-align:right; }
  .colhint { font-size:9px; font-weight:400; opacity:.85; display:block; }
  /* 長表跨頁：表頭每頁重複、列不切半（雙面列印友善） */
  thead { display:table-header-group; }
  tr { break-inside:avoid; page-break-inside:avoid; }

  .note { margin-top:10px; padding:9px 14px; background:var(--sand-soft); break-inside:avoid;
          border-left:4px solid var(--sand); border-radius:0 8px 8px 0; font-size:11.5px; line-height:1.6; }
  .note b { color:var(--teal-d); }

  /* 頁角小插圖（與成績單一致） */
  .deco { position:absolute; z-index:0; pointer-events:none; }
  .deco.bl { bottom:2mm; left:0; } .deco.br { bottom:2mm; right:0; }
  .deco.tr { top:1mm; right:2mm; opacity:.5; }
  .layer { position:relative; z-index:1; }

  @media screen { body { padding:16px; } .sheet { max-width:820px; margin:0 auto;
    box-shadow:0 6px 30px rgba(0,0,0,.18); border-radius:6px; } }
</style>
</head>
<body>
<div class="sheet">

  <!-- 插圖 -->
  <div class="deco tr"><svg width="140" height="54" viewBox="0 0 150 60"><g fill="#7cc1ba">
    <ellipse cx="22" cy="28" rx="22" ry="11"/><circle cx="12" cy="23" r="9"/><circle cx="26" cy="19" r="12"/><circle cx="38" cy="24" r="8"/></g>
    <g fill="#7cc1ba" transform="translate(70,-4) scale(.7)"><ellipse cx="22" cy="28" rx="22" ry="11"/><circle cx="12" cy="23" r="9"/><circle cx="26" cy="19" r="12"/><circle cx="38" cy="24" r="8"/></g></svg></div>
  <div class="deco bl"><svg width="160" height="86" viewBox="0 0 170 92">
    <ellipse cx="70" cy="80" rx="62" ry="12" fill="#d98b4a"/><ellipse cx="70" cy="78" rx="62" ry="7" fill="#e7a05c"/>
    <path d="M52,80 C49,58 55,46 60,38" stroke="#8a5a3b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <g fill="#2f8a80"><path d="M60,38 C44,30 30,34 26,44 C40,40 52,42 60,46 Z"/><path d="M60,38 C76,30 90,36 92,46 C80,40 68,42 60,46 Z"/>
    <path d="M60,40 C52,24 40,18 30,20 C44,24 54,32 60,46 Z"/><path d="M60,40 C70,24 84,20 92,24 C78,26 68,34 60,46 Z"/></g>
    <path d="M104,80 C102,64 106,55 110,49" stroke="#8a5a3b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <g fill="#247169"><path d="M110,49 C98,43 88,46 86,54 C97,50 105,52 110,55 Z"/><path d="M110,49 C122,43 132,47 133,55 C123,50 116,52 110,55 Z"/></g></svg></div>
  <div class="deco br"><svg width="200" height="100" viewBox="0 0 220 110">
    <path d="M0,110 C70,70 150,70 220,92 L220,110 Z" fill="#cf9a2f"/><path d="M0,110 C70,78 150,78 220,98 L220,110 Z" fill="#edc863"/>
    <path d="M150,98 C150,80 190,80 190,98 Z" fill="#8a5a3b"/><ellipse cx="170" cy="98" rx="22" ry="10" fill="#6b4630"/>
    <path d="M148,99 a22,20 0 0 1 44,0 Z" fill="#4a3020"/>
    <rect x="118" y="60" width="7" height="34" rx="3" fill="#8a5a3b"/><circle cx="121" cy="52" r="17" fill="#2f8a80"/>
    <circle cx="108" cy="60" r="12" fill="#247169"/><circle cx="134" cy="60" r="12" fill="#247169"/>
    <rect x="198" y="56" width="6" height="40" rx="3" fill="#8a5a3b"/><circle cx="201" cy="50" r="15" fill="#247169"/><circle cx="190" cy="58" r="10" fill="#2f8a80"/></svg></div>

  <div class="layer">
    <div class="hd">
      <div>
        <div class="camp">2026 理財島之好管家 · 小市集</div>
        <div class="title">我的小帳本 <small>忠心的好管家</small></div>
      </div>
      <div class="verse">「敬虔加上知足的心便是大利了」<br>（提摩太前書 6:6）</div>
    </div>

    <div class="who">
      <div class="f"><span class="lbl">姓名</span><span class="blank"></span></div>
      <div class="f"><span class="lbl">小組</span><span class="blank"></span></div>
      <div class="f"><span class="lbl">起始金</span><span class="seed-box">$ <span class="seed"></span></span></div>
    </div>

    <table>
      <thead><tr>
        <th class="c-no">#</th>
        <th>攤位 / 項目</th>
        <th class="c-in">收入 +<span class="colhint">賺到 / 領到</span></th>
        <th class="c-out">支出 −<span class="colhint">花掉 / 存入</span></th>
        <th class="c-bal">結餘<span class="colhint">現在剩多少</span></th>
      </tr></thead>
      <tbody>
        <!-- 空白列由 JS 產生，方便調整列數 -->
      </tbody>
    </table>

    <div class="note">
      <b>記帳小提醒：</b>每次交易後馬上記一筆 — 賺到記「收入」、花掉或存定存記「支出」，再算出「結餘」。<br>
      <b>好管家挑戰：</b>地上的錢市場關閉會 ×0.1 帶不走；奉獻、聽見證、感謝卡換來的<b>天國點數</b>才存得住、帶得走。你會怎麼管理神給你的銀子呢？
    </div>
  </div>

</div>
<script>
  // 空白列：約兩頁 A4（雙面列印）。改 ROWS 可調列數。
  const ROWS = 70;
  const tb = document.querySelector('tbody');
  for (let i = 1; i <= ROWS; i++) {
    tb.insertAdjacentHTML('beforeend',
      `<tr><td class="c-no">${i}</td><td></td><td class="r"></td><td class="r"></td><td class="r"></td></tr>`);
  }
</script>
</body>
</html>
